[project]
name = "mcp-k8s-utility"
version = "0.1.1"
description = "AI-assisted Kubernetes toil elimination — LLM-agnostic, policy-gated, audit-chained."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Apache-2.0" }
authors = [{ name = "vellankikoti", email = "vellankikoti@gmail.com" }]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3.11",
  "Topic :: System :: Systems Administration",
]
dependencies = [
  "pydantic>=2.7",
  "httpx>=0.27",
  "typer>=0.12",
  "fastmcp>=3.0",
  "rich>=13.7",
  "aiosqlite>=0.20",
  "kubernetes-asyncio>=30.0",
  "mcp-k8s-secure-ops>=1.0.3",
  "fastapi>=0.115",
  "uvicorn[standard]>=0.30",
  "jinja2>=3.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.2",
  "pytest-asyncio>=0.23",
  "pytest-cov>=5.0",
  "pytest-httpx>=0.30",
  "ruff>=0.4",
  "mypy>=1.10",
  "PyYAML>=6.0",
  "types-PyYAML",
]
vertex = ["google-cloud-aiplatform>=1.60"]
anthropic = ["anthropic>=0.30"]
openai = ["openai>=1.30"]

[project.scripts]
mcp-k8s-utility = "utility_server.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/utility_server"]
include = [
  "src/utility_server/**/*.py",
  "src/utility_server/dashboard/templates/**/*.html",
  "src/utility_server/dashboard/static/**/*",
]
